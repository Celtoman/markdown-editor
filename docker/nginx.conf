server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  charset utf-8;
  gzip on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  error_page 404 /404.html;

  # Canonical redirects for SEO:
  # - www -> non-www
  # - http -> https (when upstream indicates original protocol was http)
  # - /index.html|/index.htm -> /
  # - trailing slash normalization for non-root paths
  if ($host ~* "^www\.(.+)$") {
    return 308 https://$1$request_uri;
  }

  if ($http_x_forwarded_proto = "http") {
    return 308 https://$host$request_uri;
  }

  if ($uri = "/index.html") {
    return 308 /$is_args$args;
  }

  if ($uri = "/index.htm") {
    return 308 /$is_args$args;
  }

  if ($uri ~ "^/(.+)/+$") {
    return 308 /$1$is_args$args;
  }

  location = /healthz {
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location = /robots.txt {
    access_log off;
    try_files /robots.txt =404;
  }

  location = /sitemap.xml {
    access_log off;
    try_files /sitemap.xml =404;
  }

  location = /site.webmanifest {
    access_log off;
    default_type application/manifest+json;
    try_files /site.webmanifest =404;
  }

  location /assets/ {
    access_log off;
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  location = /404.html {
    internal;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
