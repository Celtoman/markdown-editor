<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Страница не найдена (404) | Interactive Markdown Editor</title>
    <meta
      name="description"
      content="Запрошенная страница не найдена. Перейдите на главную страницу Interactive Markdown Editor."
    />
    <meta name="robots" content="noindex,nofollow,noarchive" />
    <meta name="theme-color" content="#c96c45" />
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", "Inter", sans-serif;
        background:
          radial-gradient(circle at 20% 20%, rgba(201, 108, 69, 0.22), transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(55, 65, 81, 0.16), transparent 50%),
          #f8fafc;
        color: #111827;
      }

      .card {
        width: min(680px, calc(100vw - 32px));
        padding: 40px 28px;
        border-radius: 20px;
        border: 1px solid rgba(17, 24, 39, 0.12);
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 20px 45px rgba(17, 24, 39, 0.12);
      }

      .code {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        background: #1f2937;
        color: #f9fafb;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
      }

      h1 {
        margin: 14px 0 10px;
        font-size: clamp(28px, 5vw, 42px);
        line-height: 1.12;
      }

      p {
        margin: 0;
        color: #374151;
        font-size: 17px;
        line-height: 1.5;
      }

      .actions {
        margin-top: 24px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 46px;
        padding: 0 18px;
        border-radius: 12px;
        border: 1px solid transparent;
        text-decoration: none;
        font-weight: 600;
        transition: transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease;
      }

      .btn:focus-visible {
        outline: 3px solid #c96c45;
        outline-offset: 2px;
      }

      .btn.primary {
        background: #c96c45;
        color: #ffffff;
        box-shadow: 0 10px 20px rgba(201, 108, 69, 0.25);
      }

      .btn.secondary {
        background: transparent;
        color: #111827;
        border-color: rgba(17, 24, 39, 0.2);
      }

      .btn:hover {
        transform: translateY(-1px);
      }

      @media (prefers-color-scheme: dark) {
        body {
          background:
            radial-gradient(circle at 20% 20%, rgba(201, 108, 69, 0.22), transparent 50%),
            radial-gradient(circle at 80% 80%, rgba(17, 24, 39, 0.22), transparent 50%),
            #0b1120;
          color: #f9fafb;
        }

        .card {
          background: rgba(17, 24, 39, 0.88);
          border-color: rgba(255, 255, 255, 0.12);
          box-shadow: 0 22px 45px rgba(0, 0, 0, 0.38);
        }

        p {
          color: #d1d5db;
        }

        .btn.secondary {
          color: #f9fafb;
          border-color: rgba(255, 255, 255, 0.24);
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="code">ERROR 404</span>
      <h1>Такой страницы нет</h1>
      <p>Проверьте адрес в строке браузера или вернитесь на главную страницу редактора.</p>
      <div class="actions">
        <a class="btn primary" href="/">На главную</a>
        <a class="btn secondary" href="/#section-what-is">Что это за сервис</a>
      </div>
    </main>
  </body>
</html>
